name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "$RELEASE_TAG" == *-* ]]; then
            gh release create "$RELEASE_TAG" --prerelease --title "$RELEASE_TAG" --notes "Automated multi-platform release."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Automated multi-platform release."
          fi

  build-and-upload:
    needs: ensure-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-13

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Windows installer toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run smoke bootstrap
        run: python scripts/smoke_source.py

      - name: Build platform artifacts
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_exe.py
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            python scripts/build_installer.py
          fi
          python scripts/package_release.py

      - name: Upload assets to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist/release/* --clobber
